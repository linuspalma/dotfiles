---
# --------------------------------
# installation
# --------------------------------

- name: Install package
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distributiom'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
        - "unsopported.yml"
      paths: ["install"]

# --------------------------------
# config deployment
# --------------------------------

- name: remove staling config
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/waybar"
    state: absent
  become: yes

- name: ensure .config directory exists
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/waybar"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  become: yes

- name: deploy config
  ansible.builtin.copy:
    src: files/
    dest: "/home/{{ target_user }}/.config/waybar/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: preserve
  become: yes
