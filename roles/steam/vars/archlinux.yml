---
# steam-native-runtime wurde 10/2025 aus multilib entfernt (GTK2 EOL) und ist
# jetzt nur noch im AUR. ArchWiki empfiehlt ohnehin die gebündelte Runtime
# (Paket "steam") als Default.
steam_packages:
  - steam
  # --- 32-bit graphics / vulkan (VM nutzt virtio-gpu via mesa) --- #
  - lib32-mesa
  - lib32-vulkan-icd-loader
  - vulkan-tools
  # --- 32-bit audio (pulse-shim reicht; pipewire stellt die schnittstelle) --- #
  - lib32-libpulse
  - lib32-alsa-plugins
  # --- font fallbacks gegen leere labels in der steam-ui --- #
  - ttf-liberation
  - wqy-zenhei
