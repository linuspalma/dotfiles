---
# ===========================================
#  nvim Role - Main Entry Point (Router)
# ===========================================
#
# Diese Datei routet zu den distro-spezifischen Tasks.
# Struktur:
#   - archlinux.yml  -> Arch Linux spezifisch
#   - debian.yml     -> Debian spezifisch
#   - ubuntu.yml     -> Ubuntu spezifisch
#   - fedora.yml     -> Fedora spezifisch
#   - common.yml     -> Config deployment (alle Distros)
#   - unsupported.yml -> Fallback für unbekannte Distros
#

- name: Include distro-specific installation tasks
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
        - "unsupported.yml"
  tags: [nvim, server, client]

- name: Include common configuration tasks
  ansible.builtin.include_tasks: common.yml
  tags: [nvim, server, client]
