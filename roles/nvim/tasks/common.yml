---
# ===========================================
#  nvim - Common Configuration (alle Distros)
# ===========================================

# -----------------------------
#  Config Directory erstellen
# -----------------------------

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ target_user_home }}/.config"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"
  become: yes

# -----------------------------
#  Config Deployment
# -----------------------------

- name: Remove stale nvim config
  ansible.builtin.file:
    path: "{{ target_user_home }}/.config/nvim"
    state: absent
  become: yes

- name: Deploy nvim config (copy for servers)
  ansible.builtin.copy:
    src: files/
    dest: "{{ target_user_home }}/.config/nvim/"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: preserve
  become: yes

# -----------------------------
#  Root Config (optional)
# -----------------------------

- name: Ensure /root/.config directory exists
  ansible.builtin.file:
    path: /root/.config
    state: directory
    mode: "0755"
  become: yes
  when: setup_root_config | default(true) and target_user != 'root'

- name: Symlink nvim config for root user
  ansible.builtin.file:
    src: "{{ target_user_home }}/.config/nvim"
    dest: /root/.config/nvim
    state: link
    force: yes
  become: yes
  when: setup_root_config | default(true) and target_user != 'root'
