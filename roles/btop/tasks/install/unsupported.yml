---
# ===========================================
#  Unsupported Distribution
# ===========================================

- name: Warn about unsupported distribution
  ansible.builtin.fail:
    msg: |
      Distribution '{{ ansible_distribution }}' ({{ ansible_os_family }})
      is not supported for this role.

      To add support, create: roles/xxx/tasks/uninstall/{{ ansible_distribution | lower }}.yml
